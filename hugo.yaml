baseURL: "https://aezki.site/"
title: aezki
paginate: 5
theme: PaperMod

enableRobotsTXT: false
buildDrafts: true
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  title: aezki
  description: "aezki description"
  keywords: [Блог,Пиво,Дрочильна,Голые сиськи и мужики]
  author: elez_wq
  images: ["<link or path of image for opengraph, twitter-cards>"]
  DateFormat: "2006, January 2"
  defaultTheme: auto # dark, light
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false

  assets:
    disableHLJS: true
    favicon: "static/favicon.ico"
    favicon16x16: "static/favicon-16x16.png"
    favicon32x32: "static/favicon-32x32.png"

  label:
    text: "aezki.site"
    icon: /apple-touch-icon.png
    iconHeight: 35

  # home-info mode
  homeInfoParams:
    Title: "Привет \u0985"
    Content: Добро пожаловать на мой сайтик.

  socialIcons:
    - name: github
      url: "https://github.com/elez-wq"
    - name: telegram
      url: "https://t.me/elez_wq"
    - name: vk
      url: "https://vk.com/elez_wq"

  cover:
    hidden: true # hide everywhere but not in structured data
    hiddenInList: true # hide on list pages and home
    hiddenInSingle: true # hide on single page

  editPost:
    URL: "https://github.com/aezki.site/content"
    Text: "Suggest Changes" # edit text
    appendFilePath: false # to append file path to Edit link

  # for search
  # https://fusejs.io/api/options.html
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10 # refer: https://www.fusejs.io/api/methods.html#search
    keys: ["title", "permalink", "summary", "content"]
menu:
  main:
    - identifier: uptime
      name: Работа сервисов
      url: https://up.aezki.site/
      weight: 10
# Read: https://github.com/adityatelange/hugo-PaperMod/wiki/FAQs#using-hugos-syntax-highlighter-chroma
pygmentsUseClasses: true
markup:
  highlight:
    noClasses: false
    # anchorLineNos: true
    # codeFences: true
    # guessSyntax: true
    # lineNos: true
    style: monokai
